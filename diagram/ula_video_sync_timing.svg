<svg viewBox="0 0 1080 942" width="1080" height="942" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ttl dsc" font-family="Segoe UI, system-ui, sans-serif">
  <title id="ttl">ZX Spectrum ULA video_sync timing</title>
  <desc id="dsc">Horizontal scan line (c8, blank1, blank2, nHblank, hsync_5c, hsync_6c, n_sync_5c) and vertical frame (v6.v7, v8, vsync, nBorder) with NOR derivation equations. hsync is active-HIGH; n_sync is active-LOW.</desc>

  <style>
    .hdr  { font: 700 14px Segoe UI, system-ui, sans-serif; fill:#2C2C2A; letter-spacing:.3px; }
    .ttl  { font: 700 19px Segoe UI, system-ui, sans-serif; fill:#2C2C2A; }
    .sub  { font: 12px Segoe UI, system-ui, sans-serif; fill:#5F5E5A; }
    .lab  { font: 600 13px Consolas, ui-monospace, monospace; fill:#2C2C2A; }
    .sub2 { font: 9px Consolas, ui-monospace, monospace; fill:#888780; }
    .band { font: 10.5px Consolas, ui-monospace, monospace; fill:#2C2C2A; }
    .tick { font: 10px Consolas, ui-monospace, monospace; fill:#888780; }
    .note { font: 10px Consolas, ui-monospace, monospace; fill:#5F5E5A; }
    .eq   { font: 13px Consolas, ui-monospace, monospace; fill:#2C2C2A; }
    .eqv  { font: 12px Segoe UI, system-ui, sans-serif; fill:#5F5E5A; }
    .panel{ fill:#F1EFE8; opacity:.55; stroke:#B4B2A9; }
    .wave { fill:none; stroke:#2C2C2A; stroke-width:2.2; stroke-linejoin:round; }
    .wsync{ fill:none; stroke:#D4537E; stroke-width:2.2; stroke-linejoin:round; }
    .wderv{ fill:none; stroke:#1D9E75; stroke-width:2.4; stroke-linejoin:round; }
    .axis { stroke:#B4B2A9; stroke-width:1.4; }
    .guide{ stroke:#B4B2A9; stroke-width:1; stroke-dasharray:3 4; opacity:.65; }
    .t    { stroke:#888780; stroke-width:1; }
  </style>

  <rect x="0" y="0" width="1080" height="942" fill="#ffffff"/>

  <text x="16" y="26" class="ttl">ZX Spectrum ULA — <tspan font-family="Consolas, monospace">video_sync</tspan> timing</text>
  <text x="16" y="46" class="sub">hsync active-HIGH, n_sync active-LOW (book pg 90/92). Green traces are NOR outputs derived from the rows above.</text>

  <!-- legend -->
  <g transform="translate(700,34)">
    <rect x="0" y="0" width="13" height="13" fill="#1D9E75" opacity=".55"/><text x="18" y="11" class="tick">display</text>
    <rect x="74" y="0" width="13" height="13" fill="#D85A30" opacity=".55"/><text x="92" y="11" class="tick">border</text>
    <rect x="142" y="0" width="13" height="13" fill="#888780" opacity=".45"/><text x="160" y="11" class="tick">blank</text>
    <line x1="206" y1="7" x2="224" y2="7" class="wsync"/><text x="229" y="11" class="tick">sync</text>
    <line x1="268" y1="7" x2="286" y2="7" class="wderv"/><text x="291" y="11" class="tick">NOR output</text>
  </g>

  <!-- ============ PANEL A : HORIZONTAL ============ -->
  <rect x="10" y="58" width="1060" height="412" rx="10" class="panel"/>
  <text x="24" y="80" class="hdr">HORIZONTAL — one scan line: 448 pixels @ 7 MHz = 64 us   ( position = C8..C0 )</text>

  <rect x="150"   y="88" width="514.3" height="22" fill="#1D9E75" opacity=".18"/>
  <rect x="664.3" y="88" width="128.6" height="22" fill="#D85A30" opacity=".20"/>
  <rect x="792.9" y="88" width="192.8" height="22" fill="#888780" opacity=".22"/>
  <rect x="985.7" y="88" width="64.3"  height="22" fill="#D85A30" opacity=".20"/>
  <text x="407"   y="103" text-anchor="middle" class="band">display 0-255</text>
  <text x="728.6" y="103" text-anchor="middle" class="band">R.border 256-319</text>
  <text x="889.3" y="103" text-anchor="middle" class="band">blanking 320-415</text>
  <text x="1017.9" y="103" text-anchor="middle" class="band">L.bdr</text>

  <line x1="664.3" y1="88" x2="664.3" y2="424" class="guide"/>
  <line x1="792.9" y1="88" x2="792.9" y2="424" class="guide"/>
  <line x1="921.4" y1="88" x2="921.4" y2="424" class="guide"/>
  <line x1="985.7" y1="88" x2="985.7" y2="424" class="guide"/>

  <text x="20" y="147" class="lab">c8</text><text x="20" y="159" class="sub2">H-MSB >=256</text>
  <polyline class="wave" points="150,152 664.3,152 664.3,132 1050,132"/>

  <text x="20" y="191" class="lab">blank1</text><text x="20" y="203" class="sub2">320-383</text>
  <polyline class="wave" points="150,196 792.9,196 792.9,176 921.4,176 921.4,196 1050,196"/>

  <text x="20" y="235" class="lab">blank2</text><text x="20" y="247" class="sub2">384-415</text>
  <polyline class="wave" points="150,240 921.4,240 921.4,220 985.7,220 985.7,240 1050,240"/>

  <text x="20" y="279" class="lab">nHblank</text><text x="20" y="291" class="sub2">NOR(b1,b2)</text>
  <polyline class="wderv" points="150,264 792.9,264 792.9,284 985.7,284 985.7,264 1050,264"/>

  <text x="20" y="323" class="lab">hsync_5c</text><text x="20" y="335" class="sub2">336-367</text>
  <polyline class="wsync" points="150,328 825,328 825,308 889.3,308 889.3,328 1050,328"/>

  <text x="20" y="367" class="lab">hsync_6c</text><text x="20" y="379" class="sub2">344-375</text>
  <polyline class="wsync" points="150,372 841.1,372 841.1,352 905.4,352 905.4,372 1050,372"/>

  <text x="20" y="411" class="lab">n_sync_5c</text><text x="20" y="423" class="sub2">NOR(vs,hs)</text>
  <text x="610" y="391" text-anchor="middle" class="note">display line (vsync=0): n_sync = NOT hsync -> LOW during the pulse · on lines 248-251 vsync=1 holds n_sync LOW (broad V-sync)</text>
  <polyline class="wderv" points="150,396 825,396 825,416 889.3,416 889.3,396 1050,396"/>

  <line x1="150" y1="436" x2="1050" y2="436" class="axis"/>
  <g class="t">
    <line x1="150"   y1="436" x2="150"   y2="442"/>
    <line x1="664.3" y1="436" x2="664.3" y2="442"/>
    <line x1="792.9" y1="436" x2="792.9" y2="442"/>
    <line x1="921.4" y1="436" x2="921.4" y2="442"/>
    <line x1="985.7" y1="436" x2="985.7" y2="442"/>
    <line x1="1048"  y1="436" x2="1048"  y2="442"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="150"   y="452">0</text>
    <text x="664.3" y="452">256</text>
    <text x="792.9" y="452">320</text>
    <text x="921.4" y="452">384</text>
    <text x="985.7" y="452">416</text>
    <text x="1048"  y="452">447</text>
  </g>

  <!-- ============ PANEL B : VERTICAL ============ -->
  <rect x="10" y="490" width="1060" height="296" rx="10" class="panel"/>
  <text x="24" y="512" class="hdr">VERTICAL — one frame: 312 scan lines (PAL field)   ( position = V8..V0 )</text>

  <rect x="150"   y="520" width="553.9" height="22" fill="#1D9E75" opacity=".18"/>
  <rect x="703.9" y="520" width="184.5" height="22" fill="#D85A30" opacity=".18"/>
  <rect x="888.4" y="520" width="161.6" height="22" fill="#D85A30" opacity=".26"/>
  <text x="427"   y="535" text-anchor="middle" class="band">display 0-191</text>
  <text x="796.1" y="535" text-anchor="middle" class="band">border v6·v7  192-255</text>
  <text x="969.2" y="535" text-anchor="middle" class="band">border v8  256-311</text>

  <line x1="703.9" y1="520" x2="703.9" y2="734" class="guide"/>
  <line x1="888.4" y1="520" x2="888.4" y2="734" class="guide"/>

  <text x="20" y="581" class="lab">v6·v7</text><text x="20" y="593" class="sub2">192-255</text>
  <polyline class="wave" points="150,586 703.9,586 703.9,566 888.4,566 888.4,586 1050,586"/>

  <text x="20" y="627" class="lab">v8</text><text x="20" y="639" class="sub2">256-311</text>
  <polyline class="wave" points="150,632 888.4,632 888.4,612 1050,612"/>

  <text x="20" y="673" class="lab">vsync</text><text x="20" y="685" class="sub2">248-251</text>
  <polyline class="wsync" points="150,678 865.4,678 865.4,658 876.9,658 876.9,678 1050,678"/>

  <text x="20" y="719" class="lab">nBorder</text><text x="20" y="731" class="sub2">at c8=0</text>
  <polyline class="wderv" points="150,704 703.9,704 703.9,724 1050,724"/>

  <line x1="150" y1="748" x2="1050" y2="748" class="axis"/>
  <g class="t">
    <line x1="150"   y1="748" x2="150"   y2="754"/>
    <line x1="703.9" y1="748" x2="703.9" y2="754"/>
    <line x1="865.4" y1="748" x2="865.4" y2="752"/>
    <line x1="888.4" y1="748" x2="888.4" y2="754"/>
    <line x1="1047"  y1="748" x2="1047"  y2="754"/>
  </g>
  <g class="tick" text-anchor="middle">
    <text x="150"   y="764">0</text>
    <text x="703.9" y="764">192</text>
    <text x="865.4" y="764">248</text>
    <text x="888.4" y="764">256</text>
    <text x="1047"  y="764">311</text>
  </g>

  <!-- ============ PANEL C : DERIVATION ============ -->
  <rect x="10" y="806" width="1060" height="128" rx="10" class="panel"/>
  <text x="24" y="828" class="hdr">DERIVATION — NOR-gate form (green traces above)</text>

  <text x="24"  y="853" class="eq">nHblank   = NOR( blank1 , blank2 )</text>
  <text x="430" y="853" class="eqv">blank1 = c8·!c7·c6 (320-383),  blank2 = c8·c7·!c5 (384-415)</text>

  <text x="24"  y="878" class="eq">hsync     = NOR( !c6 , c7 , !c8 , nhsyncpulses )</text>
  <text x="430" y="878" class="eqv">active-HIGH;  nhsyncpulses = XNOR(c3·c4, c5) for 6c</text>

  <text x="24"  y="903" class="eq">n_sync    = NOR( vsync , hsync )</text>
  <text x="430" y="903" class="eq">nBorder = NOR( c8 , v8 , v6·v7 )</text>

  <text x="24"  y="924" class="note">c8 = H-counter MSB (pixel >=256) · v6,v7,v8 = V line-counter bits · vsync &amp; hsync active-HIGH, n_sync active-LOW · nBorder HIGH only for c8=0 AND line &lt;=191</text>
</svg>
